version: "3.9"
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: elderco
      MYSQL_USER: crmuser
      MYSQL_PASSWORD: password123
      MYSQL_ROOT_PASSWORD: password123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "crmuser", "-ppassword123"]
      interval: 5s
      timeout: 5s
      retries: 10


  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             gunicorn dcrm.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
        db:
          condition: service_healthy

volumes:
  mysql_data: